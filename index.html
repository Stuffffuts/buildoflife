<!DOCTYPE html>
<html>
<body>
<h1>Cosmic Game</h1>

<p>Cosmic Process: <span id="c">0</span></p>
<p>Atoms: <span id="a">0</span></p>
<p>Molecules: <span id="m">0</span></p>
<p>Macromolecules: <span id="M">0</span></p>

<button onclick="g()">Generate</button>
<button onclick="ba()">Buy Atom (+1, cost: 10 cosmic)</button>
<button onclick="bm()">25 Atoms → 1 Molecule</button>
<button onclick="bM()">100 Molecules → 1 Macromolecule</button>

<script>
// ================= DATA =================
let c = 0, a = 0, m = 0, M = 0;

// ================= SAVE =================
function load() {
  let save = JSON.parse(localStorage.getItem("cosmicSave"));
  if (save) {
    c = save.c || 0;
    a = save.a || 0;
    m = save.m || 0;
    M = save.M || 0;
  }
}

function save() {
  localStorage.setItem("cosmicSave", JSON.stringify({c,a,m,M}));
}

// ================= UI =================
function u() {
  document.getElementById('c').innerText = Math.floor(c);
  document.getElementById('a').innerText = a;
  document.getElementById('m').innerText = m;
  document.getElementById('M').innerText = M;
}

// ================= CORE LOGIC =================
function g() {
  // Macromolecules buff molecules
  let effectiveMolecules = m * (2 ** M);

  // Molecules buff atoms
  let effectiveAtoms = a * (2 ** effectiveMolecules);

  // Final cosmic gain
  c += Math.max(1, effectiveAtoms) * (2 ** a) * (3 ** M);

  u();
}

// ================= BUY =================
function ba() {
  if (c >= 10) {
    c -= 10;
    a++;
    u();
  } else {
    alert("Not enough cosmic!");
  }
}

function bm() {
  if (a >= 25) {
    a -= 25;
    m++;
    u();
  } else {
    alert("Need 25 atoms!");
  }
}

function bM() {
  if (m >= 100) {
    m -= 100;
    M++;
    u();
  } else {
    alert("Need 100 molecules!");
  }
}

// ================= START =================
load();
u();
setInterval(save, 1000);
</script>

</body>
</html>
