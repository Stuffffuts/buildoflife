<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Build Your Own World</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#fff;
    color:#111;
    text-align:center;
    margin:0;
    padding:20px;
}
.card{
    max-width:520px;
    margin:20px auto;
    padding:20px;
    border:1px solid #ddd;
    border-radius:16px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}
input,button{
    padding:10px;
    margin:6px;
    border-radius:10px;
    border:1px solid #ccc;
}
button{
    cursor:pointer;
    background:#111;
    color:#fff;
}
button:hover{
    opacity:.9;
}
.hidden{
    display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="card">
    <h1>Login</h1>

    <input id="nameInput" placeholder="Username"><br>
    <input id="passInput" type="password" placeholder="Password"><br>

    <button onclick="createAccount()">Create Account</button>
    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<!-- GAME -->
<div id="gamePage" class="hidden">

<div class="card">
    <h1>Build Your Own World</h1>

    <p>User ID: <span id="uid"></span></p>

    <p>Cosmic Process: <span id="c">0</span></p>
    <p>Atoms: <span id="a">0</span></p>
    <p>Molecules: <span id="m">0</span></p>
    <p>Macromolecules: <span id="M">0</span></p>

    <button onclick="g()">Generate</button>

    <hr>

    <h3>Atoms (10 Cosmic each)</h3>
    <button onclick="ba(1)">Buy 1 Atom</button>
    <button onclick="ba(2)">Buy 2 Atom</button>
    <button onclick="ba(5)">Buy 5 Atom</button>
    <button onclick="ba(10)">Buy 10 Atom</button>

    <hr>

    <h3>Molecules (25 Atoms)</h3>
    <button onclick="bm(1)">Buy 1 Molecule</button>
    <button onclick="bm(2)">Buy 2 Molecules</button>
    <button onclick="bm(5)">Buy 5 Molecules</button>
    <button onclick="bm(10)">Buy 10 Molecules</button>

    <hr>

    <h3>Macromolecules (100 Molecules)</h3>
    <button onclick="bM(1)">Buy 1 Macro</button>
    <button onclick="bM(2)">Buy 2 Macro</button>
    <button onclick="bM(5)">Buy 5 Macro</button>
    <button onclick="bM(10)">Buy 10 Macro</button>

    <hr>

    <button onclick="resetGame()">Reset Progress</button>
</div>

<div class="card">
    <button onclick="toggleBoard('daily')">Daily Leaderboard</button>
    <button onclick="toggleBoard('all')">All Time Leaderboard</button>

    <div id="daily" class="hidden"></div>
    <div id="all" class="hidden"></div>
</div>

</div>

<script>
let c = 0;
let a = 0;
let m = 0;
let M = 0;
let currentUser = null;

/* ---------- USERS ---------- */
function makeID(){
    return "USER" + Math.floor(Math.random()*900000+100000);
}

function users(){
    return JSON.parse(localStorage.getItem("users") || "{}");
}

function saveUsers(u){
    localStorage.setItem("users", JSON.stringify(u));
}

/* ---------- ACCOUNT ---------- */
function createAccount(){
    let n = nameInput.value.trim();
    let p = passInput.value.trim();
    let u = users();

    if(!n || !p){
        msg.innerText = "Enter username + password";
        return;
    }

    if(u[n]){
        msg.innerText = "Username taken, choose another name";
        return;
    }

    u[n] = {
        password:p,
        id:makeID(),
        c:0,
        a:0,
        m:0,
        M:0
    };

    saveUsers(u);
    msg.innerText = "Account created!";
}

function login(){
    let n = nameInput.value.trim();
    let p = passInput.value.trim();
    let u = users();

    if(u[n] && u[n].password === p){
        currentUser = n;

        c = Number(u[n].c) || 0;
        a = Number(u[n].a) || 0;
        m = Number(u[n].m) || 0;
        M = Number(u[n].M) || 0;

        uid.innerText = u[n].id;

        loginPage.classList.add("hidden");
        gamePage.classList.remove("hidden");

        render();
        updateBoards();
    }else{
        msg.innerText = "Wrong login";
    }
}

/* ---------- BUFFS ---------- */
function atomBuyAmount(){
    return 1 + m;
}

function moleculeBuyAmount(){
    return 1 + M;
}

/* ---------- SAVE ---------- */
function save(){
    if(!currentUser) return;

    let u = users();

    u[currentUser].c = c;
    u[currentUser].a = a;
    u[currentUser].m = m;
    u[currentUser].M = M;

    saveUsers(u);
}

/* ---------- GENERATE ---------- */
function g(){
    c += Math.max(1, a * 2);
    render();
}

/* ---------- BUY ATOMS ---------- */
function ba(t){
    t = Number(t) || 0;

    let cost = 10 * t;

    if(c >= cost){
        c -= cost;
        a += atomBuyAmount() * t;
        render();
    }
}

/* ---------- BUY MOLECULES ---------- */
function bm(t){
    t = Number(t) || 0;

    let cost = 25 * t;

    if(a >= cost){
        a -= cost;
        m += moleculeBuyAmount() * t;
        render();
    }
}

/* ---------- BUY MACROMOLECULES ---------- */
function bM(t){
    t = Number(t) || 0;

    let cost = 100 * t;

    if(m >= cost){
        m -= cost;
        M += t;
        render();
    }
}

/* ---------- RESET ---------- */
function resetGame(){
    if(confirm("Reset progress?")){
        c = 0;
        a = 0;
        m = 0;
        M = 0;
        render();
    }
}

/* ---------- RENDER ---------- */
function render(){
    c = Number(c) || 0;
    a = Number(a) || 0;
    m = Number(m) || 0;
    M = Number(M) || 0;

    document.getElementById("c").innerText = Math.floor(c);
    document.getElementById("a").innerText = Math.floor(a);
    document.getElementById("m").innerText = Math.floor(m);
    document.getElementById("M").innerText = Math.floor(M);

    save();
}

/* ---------- LEADERBOARD ---------- */
function boardHTML(){
    let arr = [];
    let u = users();

    for(let n in u){
        arr.push({
            name:n,
            score:Number(u[n].c) || 0
        });
    }

    arr.sort((x,y)=>y.score-x.score);

    return arr.slice(0,10).map((x,i)=>
        (i+1)+". "+x.name+" - "+Math.floor(x.score)
    ).join("<br>");
}

function updateBoards(){
    daily.innerHTML = boardHTML();
    all.innerHTML = boardHTML();
}

function toggleBoard(id){
    document.getElementById(id).classList.toggle("hidden");
    updateBoards();
}

setInterval(updateBoards,60000);
</script>

</body>
</html>
