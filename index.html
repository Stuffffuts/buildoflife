<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Build Your Own World</title>
<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}
button{
  margin:5px;
  padding:10px;
  font-size:16px;
}
input{
  padding:8px;
  margin:5px;
}
.box{
  border:2px solid white;
  padding:15px;
  margin:10px auto;
  width:350px;
}
</style>
</head>
<body>

<h1>🌍 Build Your Own World</h1>

<div class="box">
<h2>Account</h2>
<p>ID: <span id="uid">None</span></p>
<input id="nameInput" placeholder="Username">
<input id="passInput" placeholder="Password">
<br>
<button onclick="createAccount()">Create Account</button>
<button onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<div class="box">
<p>Cosmic Process: <span id="c">0</span></p>
<p>Atoms: <span id="a">0</span></p>
<p>Molecules: <span id="m">0</span></p>
<p>Macromolecules: <span id="M">0</span></p>

<button onclick="g()">Generate</button><br>

<button onclick="ba(1)">Buy 1 Atom</button>
<button onclick="ba(2)">Buy 2 Atom</button>
<button onclick="ba(5)">Buy 5 Atom</button>
<button onclick="ba(10)">Buy 10 Atom</button><br>

<button onclick="bm()">Buy Molecule</button>
<button onclick="bM()">Buy Macromolecule</button><br>

<button onclick="resetGame()">Reset Progress</button>
</div>

<div class="box">
<h2>🏆 Daily Leaderboard</h2>
<div id="daily"></div>
</div>

<div class="box">
<h2>👑 All Time Leaderboard</h2>
<div id="alltime"></div>
</div>

<script>
// ================= GAME DATA =================
let c=0,a=0,m=0,M=0;
let currentUser=null;
let userID=null;

// ================= HELPERS =================
function makeID(){
  return "USER"+Math.floor(Math.random()*999999);
}

function atomBuyAmount(){
  return 1+m;
}

function moleculeBuyAmount(){
  return 1+M;
}

// ================= ACCOUNT =================
function createAccount(){
  let name=nameInput.value.trim();
  let pass=passInput.value.trim();

  if(!name || !pass){
    alert("Enter username + password");
    return;
  }

  let users=JSON.parse(localStorage.getItem("users")||"{}");

  if(users[name]){
    alert("Username exists!");
    return;
  }

  let id=makeID();

  users[name]={
    password:pass,
    id:id,
    c:0,a:0,m:0,M:0
  };

  localStorage.setItem("users",JSON.stringify(users));
  alert("Account created!");
}

function login(){
  let name=nameInput.value.trim();
  let pass=passInput.value.trim();

  let users=JSON.parse(localStorage.getItem("users")||"{}");

  if(users[name] && users[name].password===pass){
    currentUser=name;
    userID=users[name].id;

    c=users[name].c;
    a=users[name].a;
    m=users[name].m;
    M=users[name].M;

    uid.innerText=userID;
    loginMsg.innerText="Logged in as "+name;
    u();
  }else{
    alert("Wrong login!");
  }
}

// ================= SAVE =================
function save(){
  if(!currentUser)return;

  let users=JSON.parse(localStorage.getItem("users")||"{}");

  users[currentUser].c=c;
  users[currentUser].a=a;
  users[currentUser].m=m;
  users[currentUser].M=M;

  localStorage.setItem("users",JSON.stringify(users));
  updateBoards();
}

// ================= GAME =================
function g(){
  let gain=a*2;
  if(gain<1)gain=1;
  c+=gain;
  u();
}

function ba(times){
  let cost=10*times;

  if(c>=cost){
    c-=cost;
    a+=atomBuyAmount()*times;
    u();
  }else{
    alert("Need more cosmic!");
  }
}

function bm(){
  if(a>=25){
    a-=25;
    m+=moleculeBuyAmount();
    u();
  }else{
    alert("Need 25 atoms!");
  }
}

function bM(){
  if(m>=100){
    m-=100;
    M++;
    u();
  }else{
    alert("Need 100 molecules!");
  }
}

function resetGame(){
  if(confirm("Reset progress?")){
    c=0;a=0;m=0;M=0;
    u();
  }
}

// ================= UI =================
function u(){
  document.getElementById("c").innerText=Math.floor(c);
  document.getElementById("a").innerText=a;
  document.getElementById("m").innerText=m;
  document.getElementById("M").innerText=M;
}

// ================= LEADERBOARDS =================
function updateBoards(){
  let users=JSON.parse(localStorage.getItem("users")||"{}");
  let arr=[];

  for(let name in users){
    let score=users[name].c+users[name].a+users[name].m*10+users[name].M*100;
    arr.push({name:name,score:score});
  }

  arr.sort((x,y)=>y.score-x.score);

  let html="";
  for(let i=0;i<Math.min(5,arr.length);i++){
    html += (i+1)+". "+arr[i].name+" - "+Math.floor(arr[i].score)+"<br>";
  }

  daily.innerHTML=html;
  alltime.innerHTML=html;
}

// ================= AUTO =================
setInterval(save,1000);
setInterval(updateBoards,60000); // refresh every minute
updateBoards();
u();
</script>

</body>
</html>
