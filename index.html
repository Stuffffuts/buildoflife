<!DOCTYPE html>
<html>
  <body>

    <h1>buttons</h1>

    <p>Money: <span id="money">0</span></p>

    <button onclick="addMoney()">Click me!</button>

    <script>
      let money = 0;

      function addMoney() {
        money = money + 1;
        document.getElementById("money").innerText = money;
      }
    </script>

  </body>
</html>
